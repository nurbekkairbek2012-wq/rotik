<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>Кіру | Kenesary</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-container">
        <h2>Ойынға кіру</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Пайдаланушы аты</label>
                <input type="text" id="username" required placeholder="Введите ник">
            </div>
            <div class="input-group">
                <label for="password">Құпия сөз</label>
                <input type="password" id="password" required placeholder="Введите пароль">
            </div>
            <button type="submit" class="btn">Жүйеге кіру</button>
        </form>
        <div class="switch-page">
           Аккаунтыңыз жоқ па? <a href="register.html">Тіркелу</a>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="auth.js"></script>
</body>
</html>
