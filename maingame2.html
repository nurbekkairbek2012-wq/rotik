<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сұрақ-жауап: Кенесары хан - Shadow of the Steppe</title>
    
    <script src="utils.js"></script>
    <script>requireAuth();</script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* НЕГІЗГІ СТИЛЬДЕР */
        :root {
            --accent-gold: #D4AF37;
            --accent-glow: rgba(212, 175, 55, 0.4);
            --bg-base: #0a0f16;
            --glass-bg: rgba(20, 25, 35, 0.85);
            --glass-border: rgba(212, 175, 55, 0.2);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(30, 58, 138, 0.1), transparent 25%);
            color: var(--text-main); min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; user-select: none;
            opacity: 0; transition: opacity 1s ease;
        }

        body.loaded { opacity: 1; }

        .glass {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1, h2, h3 { font-family: 'Cinzel', serif; }

        /* ШЫҒУ ТҮЙМЕСІ */
        .back-btn {
            position: absolute; top: 30px; right: 40px; font-size: 40px;
            color: var(--accent-gold); text-decoration: none;
            transition: 0.3s; cursor: pointer; z-index: 200;
        }
        .back-btn:hover { color: var(--danger); transform: scale(1.2); }

        .screen {
            display: none; flex-direction: column; align-items: center;
            justify-content: center; width: 90%; max-width: 900px;
            text-align: center; padding: 40px; opacity: 0; transition: opacity 0.4s ease-in-out;
        }
        .screen.active { display: flex; opacity: 1; }
        .fade-content { width: 100%; transition: opacity 0.3s ease-in-out; }
        .fade-content.hidden { opacity: 0; }

        .title-gold {
            font-size: 3rem; text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #B8860B 100%);
            color: #000; border: none; padding: 15px 40px; font-size: 1.1rem;
            font-weight: 700; border-radius: 12px; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
            margin: 10px; box-shadow: 0 0 15px var(--accent-glow);
        }
        .btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.6); }
        .btn-outline { background: transparent; border: 2px solid var(--accent-gold); color: var(--accent-gold); box-shadow: none; }
        .btn-outline:hover { background: rgba(212, 175, 55, 0.1); box-shadow: 0 0 15px var(--accent-glow); }

        /* ОЙЫН ПРОЦЕСІ */
        .hud {
            display: flex; justify-content: space-between; width: 100%;
            margin-bottom: 20px; font-size: 1.2rem; font-weight: 600; color: var(--accent-gold);
            padding: 15px 20px; border-bottom: 1px solid var(--glass-border);
        }

        .question-box { padding: 30px; margin-bottom: 25px; width: 100%; min-height: 120px; display: flex; align-items: center; justify-content: center; }
        .question-text { font-size: 1.4rem; margin: 0; line-height: 1.5; font-weight: 500; }

        .answers-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; }
        .answer-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main); padding: 20px; border-radius: 12px; font-size: 1.1rem;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .answer-btn:hover { background: rgba(212, 175, 55, 0.2); border-color: var(--accent-gold); }
        .answer-btn.correct { background: rgba(16, 185, 129, 0.2) !important; border-color: var(--success); color: var(--success); font-weight: bold;}
        .answer-btn.wrong { background: rgba(239, 68, 68, 0.2) !important; border-color: var(--danger); color: #ff9999; }

        /* РЕЙТИНГ ЖӘНЕ АВАТАР (КЕСТЕ ЖАҚСАРТЫЛДЫ) */
        .scroll-box { padding: 20px; border-radius: 15px; width: 100%; margin-bottom: 20px; overflow-y: auto; max-height: 450px; }
        .scroll-box::-webkit-scrollbar { width: 6px; }
        .scroll-box::-webkit-scrollbar-track { background: transparent; }
        .scroll-box::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 10px; }

        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0 8px; 
            color: white; 
            table-layout: fixed; /* Кестенің бағандарын бірқалыпты ұстау үшін */
        }
        
        /* Бағандардың нақты ені мен туралануы */
        th:nth-child(1), td:nth-child(1) { width: 15%; text-align: center; } /* Орын */
        th:nth-child(2), td:nth-child(2) { width: 45%; text-align: left; }   /* Ойыншы */
        th:nth-child(3), td:nth-child(3) { width: 20%; text-align: center; } /* Ұпай */
        th:nth-child(4), td:nth-child(4) { width: 20%; text-align: center; } /* Уақыт */

        th { padding: 15px; color: var(--accent-gold); border-bottom: 1px solid var(--glass-border); font-family: 'Cinzel'; font-size: 1.1rem; }
        td { padding: 10px 15px; background: rgba(255,255,255,0.03); border-radius: 8px; vertical-align: middle; }
        
        /* Аватар және Никнейм стилі */
        .player-info-cell { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .player-avatar { width: 40px; height: 40px; min-width: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-gold); display: block; }
        .player-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; font-size: 1.05rem; }

        .rank-1 td { background: rgba(212, 175, 55, 0.15); color: var(--accent-gold); font-weight: bold; border: 1px solid rgba(212, 175, 55, 0.5); border-left: none; border-right: none;}
        .rank-1 td:first-child { border-left: 1px solid rgba(212, 175, 55, 0.5); }
        .rank-1 td:last-child { border-right: 1px solid rgba(212, 175, 55, 0.5); }

        .rank-2 td { background: rgba(192, 192, 192, 0.1); color: #e2e8f0; font-weight: bold; }
        .rank-3 td { background: rgba(205, 127, 50, 0.1); color: #fbd38d; font-weight: bold; }

        .coin-reward { font-size: 1.5rem; color: #f1c40f; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        .mistake-item { border-bottom: 1px solid var(--glass-border); padding: 15px 0; text-align: left; }
        .mistake-q { color: var(--accent-gold); font-weight: 600; margin-bottom: 5px; font-size: 1.1rem;}
        .mistake-wrong { color: var(--danger); font-size: 0.95rem; margin-bottom: 3px;}
        .mistake-right { color: var(--success); font-weight: bold; font-size: 0.95rem; }

        @media (max-width: 768px) { 
            .answers-grid { grid-template-columns: 1fr; } 
            .title-gold { font-size: 2rem; } 
            table th, table td { padding: 8px; font-size: 0.85rem;} 
            .player-avatar {width: 32px; height: 32px; min-width: 32px;}
            .player-name { font-size: 0.9rem; }
        }
    </style>
</head>
<body onload="document.body.classList.add('loaded')">

    <a class="back-btn" onclick="smoothExit()">&times;</a>

    <div id="start-screen" class="screen active glass">
        <h1 class="title-gold">КЕНЕСАРЫ ХАН КӨТЕРІЛІСІ</h1>
        <p style="font-size: 1.2rem; margin-bottom: 30px; color: var(--text-muted);">20 Сұрақ | Уақыт шектеулі | Жоғары қиындық</p>
        <button class="btn" id="startBtn">ОЙЫНДЫ БАСТАУ</button>
        <button class="btn btn-outline" id="lbBtn">🏆 РЕЙТИНГ</button>
    </div>

    <div id="quiz-screen" class="screen glass" style="padding: 20px;">
        <div class="hud">
            <span id="progressText">Сұрақ: 1/20</span>
            <span id="timerText" style="font-family: monospace; font-size: 1.4rem;">00:00.000</span>
        </div>
        
        <div id="quiz-content" class="fade-content">
            <div class="question-box">
                <p id="question" class="question-text">Сұрақ...</p>
            </div>
            <div id="answers" class="answers-grid"></div>
        </div>
    </div>

    <div id="result-screen" class="screen glass">
        <h1 id="result-title" class="title-gold">ОЙЫН АЯҚТАЛДЫ</h1>
        <p style="color: var(--text-muted); font-size: 1.2rem;">Дұрыс жауаптар:</p>
        <p id="score-text" style="font-size: 3rem; font-weight: 700; color: var(--accent-gold); margin: 10px 0;">0 / 20</p>
        <p id="time-text" style="color: var(--text-main); margin-bottom: 10px; font-size: 1.2rem;">Уақыт: 00:00.000</p>
        
        <p id="coin-display" class="coin-reward"></p>
        
        <p id="save-status" style="color: var(--success); font-weight: bold; margin-bottom: 20px;"></p>

        <button class="btn" onclick="location.reload()">ҚАЙТА ОЙНАУ</button>
        <button class="btn" id="reviewBtn" style="background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); display: none;">ҚАТЕЛЕРМЕН ЖҰМЫС</button>
        <button class="btn btn-outline" id="resultLbBtn">🏆 РЕЙТИНГТІ КӨРУ</button>
    </div>

    <div id="review-screen" class="screen glass">
        <h2 class="title-gold">ҚАТЕЛЕР ТІЗІМІ</h2>
        <div class="scroll-box" id="review-box"></div>
        <button class="btn btn-outline" onclick="document.getElementById('review-screen').classList.remove('active'); document.getElementById('result-screen').classList.add('active');">АРТҚА</button>
    </div>

    <div id="leaderboard-screen" class="screen glass">
        <h2 class="title-gold">🏆 ТОП 10 ҮЗДІК</h2>
        <p id="loading-text" style="color: var(--accent-gold);">Деректер жүктелуде...</p>
        
        <div class="scroll-box" style="padding: 0;">
            <table id="leaderboard-table"></table>
        </div>

        <button class="btn btn-outline" onclick="location.reload()" style="margin-top: 20px;">МӘЗІРГЕ ОРАЛУ</button>
    </div>

    <script>
        function smoothExit() {
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'maingame1.html'; }, 500);
        }
    </script>

    <script>

        const factualQuestions = [
            { id: 0, q: "Кенесары хан бастаған ұлт-азаттық көтеріліс қай жылдары болды?", a: ["1837-1847 жж.", "1836-1838 жж.", "1783-1797 жж.", "1858-1860 жж."], correct: 0 },
            { id: 1, q: "Кенесары көтерілісінің екінші (шарықтау) кезеңі қашан болды?", a: ["1841-1845 жж.", "1837-1840 жж.", "1845-1847 жж.", "1838-1841 жж."], correct: 0 },
            { id: 2, q: "Кенесары қай жылы барлық үш жүздің ханы болып сайланды?", a: ["1841 жылы қыркүйекте", "1838 жылы мамырда", "1845 жылы қазанда", "1837 жылы көктемде"], correct: 0 },
            { id: 3, q: "Көтерілістің соңғы кезеңі (Жетісу мен Қырғыз жеріндегі) қай жылдарды қамтиды?", a: ["1846-1847 жж.", "1841-1845 жж.", "1845-1846 жж.", "1844-1847 жж."], correct: 0 },
            { id: 4, q: "Көтеріліс ресми түрде қай айда, қай жылы басталды деп есептеледі?", a: ["1837 жылы қарашада (Ақтау бекінісіне шабуыл)", "1838 жылы мамырда (Ақмолаға шабуыл)", "1836 жылы жазда", "1841 жылы күзде"], correct: 0 },
            { id: 5, q: "Патша үкіметінің қай реформасы көтерілістің шығуына негізгі себеп болды?", a: ["1822 және 1824 жылғы жарғылар", "1867-1868 жж. реформалар", "1891 жылғы Ереже", "1731 жылғы ант қабылдау"], correct: 0 },
            { id: 6, q: "Көтерілістің басты себептерінің бірі патша үкіметінің қандай әрекеті еді?", a: ["Жаңа бекіністер салып, қазақ жерлерін тартып алуы", "Ислам дініне тыйым салуы", "Жалпыға бірдей әскери міндеткерлік енгізуі", "Мал санын шектеуі"], correct: 0 },
            { id: 7, q: "Орта жүздегі хандық билікті жойған құжат?", a: ["Сібір қазақтарының жарғысы (1822 ж.)", "Орынбор қазақтарының жарғысы (1824 ж.)", "Түркістан ережесі", "Дала ережесі"], correct: 0 },
            { id: 8, q: "Кенесары көтерілісінің себебіне Қоқан хандығының қандай саясаты кіреді?", a: ["Оңтүстік қазақтарына ауыр салықтар салып, қысым жасауы", "Орыстармен одақтасуы", "Қытаймен шекараны жабуы", "Жетісуді Ресейге беруі"], correct: 0 },
            { id: 9, q: "Кенесары ханның басты саяси мақсаты қандай болды?", a: ["Абылай хан тұсындағы тәуелсіз Қазақ хандығын қалпына келтіру", "Ресей империясының құрамына автономия болып кіру", "Қоқан хандығына толық бағыну", "Тек Кіші жүзді ғана азат ету"], correct: 0 },
            { id: 10, q: "Патша І Николайға жазған хатында Кенесары нені талап етті?", a: ["Бекіністерді қиратып, қазақ жерінен орыс әскерін әкетуді", "Өзіне генерал шенін беруді", "Керуендерден салық алу құқығын", "Қоқанға қарсы орыстардан қару сұрады"], correct: 0 },
            { id: 11, q: "Кенесарының Орта Азия хандықтарына қатысты мақсаты?", a: ["Олардың қазақ жерлеріне басқыншылығын тоқтату", "Хиуа мен Бұхараны жаулап алу", "Ташкентті Ресейге беріп қою", "Олармен діни одақ құру"], correct: 0 },
            { id: 12, q: "Кенесары құрған мемлекеттік құрылым қалай аталды?", a: ["Орталықтандырылған Қазақ хандығы", "Қазақ Республикасы", "Автономиялық округ", "Имамдық"], correct: 0 },
            { id: 13, q: "Кенесарының атасы кім болған?", a: ["Абылай хан", "Әбілқайыр хан", "Кенесарының әкесі Абылай еді", "Тәуке хан"], correct: 0 },
            { id: 14, q: "Кенесары Қасымұлы қай жылы дүниеге келген?", a: ["1802 жылы", "1795 жылы", "1812 жылы", "1824 жылы"], correct: 0 },
            { id: 15, q: "Кенесарының өзіне дейін көтерілісті бастаған, Ташкентте өлтірілген ағасы?", a: ["Саржан", "Есенгелді", "Қасым", "Наурызбай"], correct: 0 },

            { id: 17, q: "Кенесарының қарындасы, көтеріліске белсене қатысқан батыр қыз?", a: ["Бопай", "Айғаным", "Домалақ ана", "Зере"], correct: 0 },
            { id: 18, q: "1836 жылы Қоқан бектері Кенесарының кімдерін зұлымдықпен өлтірді?", a: ["Әкесі Қасымды және ағасы Есенгелдіні", "Інісі Наурызбайды", "Баласы Сыздықты", "Қарындасы Бопайды"], correct: 0 },
            { id: 19, q: "Қай бекіністің салынуы Кенесарының ашық күреске шығуына түрткі болды?", a: ["Ақтау және Ақмола бекіністерінің", "Орынбор мен Троицк", "Верный (Алматы)", "Омбы мен Петропавл"], correct: 0 },

            { id: 22, q: "Көтерілістің негізгі қозғаушы күші кімдер болды?", a: ["Қарапайым шаруалар мен батырлар", "Тек қана сұлтандар", "Орыс казактары", "Діни қайраткерлер"], correct: 0 },

            { id: 26, q: "Көтеріліс қазақ даласының қай бөлігін қамтыды?", a: ["Үш жүздің де аумағын (бүкіл Қазақстанды)", "Тек Кіші жүзді", "Тек Жетісуды", "Тек Сырдария бойын"], correct: 0 },

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function formatTime(msTotal) {
            let totalSeconds = Math.floor(msTotal / 1000);
            let m = Math.floor(totalSeconds / 60); let s = totalSeconds % 60; let ms = msTotal % 1000;
            return `${m < 10 ? "0"+m : m}:${s < 10 ? "0"+s : s}.${ms < 10 ? "00"+ms : (ms < 100 ? "0"+ms : ms)}`;
        }

        function updateTimer() {
            elapsedMilliseconds = Date.now() - startTime;
            timerEl.innerText = formatTime(elapsedMilliseconds);
        }

        function showQuestion() {
            quizContent.classList.remove('hidden');
            let qData = currentQuestions[currentQuestionIndex];
            progressEl.innerText = `Сұрақ: ${currentQuestionIndex + 1}/${currentQuestions.length}`;
            questionEl.innerText = qData.q;
            answersEl.innerHTML = '';

            let options = qData.a.map((text, index) => ({ text: text, originalIndex: index }));
            shuffleArray(options);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn'; btn.innerText = opt.text;
                btn._originalIndex = opt.originalIndex; // сохраняем для checkAnswer
                btn.addEventListener('click', () => checkAnswer(opt.originalIndex === qData.correct, btn, qData, opt.originalIndex));
                answersEl.appendChild(btn);
            });
        }

        function checkAnswer(isCorrect, btnElement, qData, chosenIndex) {
            // Записываем question_id + выбранный индекс для отправки на сервер
            userAnswers.push({ question_id: qData.id, chosen: chosenIndex });

            const allBtns = answersEl.querySelectorAll('.answer-btn');

            // Сначала подсвечиваем выбранную кнопку и правильный ответ
            allBtns.forEach(btn => {
                const btnOriginalIndex = btn._originalIndex;
                if (btnOriginalIndex === qData.correct) {
                    btn.classList.add('correct'); // всегда показываем правильный ответ
                }
                btn.replaceWith(btn.cloneNode(true)); // блокируем клики клонированием
            });

            // После клонирования заново находим нашу кнопку по тексту и красим в wrong
            if (!isCorrect) {
                const clonedBtns = answersEl.querySelectorAll('.answer-btn');
                clonedBtns.forEach(btn => {
                    if (btn.innerText === btnElement.innerText && !btn.classList.contains('correct')) {
                        btn.classList.add('wrong');
                    }
                });
                mistakes.push({ q: qData.q, wrong: btnElement.innerText, right: qData.a[qData.correct] });
            } else {
                score++;
            }

            setTimeout(() => {
                quizContent.classList.add('hidden'); 
                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < currentQuestions.length) showQuestion();
                    else endGame();
                }, 300);
            }, 800);
        }

                        <td style="font-family:monospace;">${formatTime(user.time_ms)}</td>
                    `;
                    table.appendChild(tr);
                });
            } catch (error) {
                console.error("Лидерборд қатесі:", error);
                document.getElementById('loading-text').innerText = "Деректерді жүктеу кезінде қате кетті.";
                document.getElementById('loading-text').style.color = "var(--danger)";
            }
        }

        function showReview() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            reviewScreen.classList.add('active');

            const box = document.getElementById('review-box');
            box.innerHTML = "";

            mistakes.forEach((m, index) => {
                box.innerHTML += `
                    <div class="mistake-item">
                        <div class="mistake-q">${index + 1}. ${m.q}</div>
                        <div class="mistake-wrong">❌ Сенің жауабың: ${m.wrong}</div>
                        <div class="mistake-right">✅ Дұрыс жауап: ${m.right}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
