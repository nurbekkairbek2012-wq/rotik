<!DOCTYPE html>
<html lang="kk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дүкен | Shadow of the Steppe</title>

    <script src="utils.js"></script>
    <script>requireAuth();</script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --accent-gold: #D4AF37;
            --accent-glow: rgba(212, 175, 55, 0.4);
            --bg-base: #0a0f16;
            --glass-bg: rgba(20, 25, 35, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;

            /* Сиректік түстері (Редкость) */
            --rarity-common: #94a3b8;
            /* Обычная - Сұр */
            --rarity-rare: #10b981;
            /* Редкая - Жасыл */
            --rarity-epic: #a855f7;
            /* Эпик - Күлгін */
            --rarity-legendary: #D4AF37;
            /* Лега - Сары/Алтын */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(30, 58, 138, 0.1), transparent 25%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            animation: fadeInPage 0.8s ease-out;
        }

        @keyframes fadeInPage {
            from {
                opacity: 0;
                filter: blur(10px);
            }

            to {
                opacity: 1;
                filter: blur(0);
            }
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }

        /* --- Сайдбар --- */
        .sidebar {
            width: 90px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 0;
            justify-content: space-between;
            z-index: 50;
            border-right: 1px solid var(--glass-border);
        }

        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 32px;
            width: 100%;
            align-items: center;
        }

        .nav-btn {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            cursor: pointer;
            opacity: 0.6;
        }

        .nav-btn img {
            width: 24px;
            height: 24px;
            filter: invert(1);
        }

        .nav-btn:hover,
        .nav-btn.active {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .profile-avatar-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        /* --- Негізгі контент --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 40px 60px;
            position: relative;
        }

        .main-content::-webkit-scrollbar {
            width: 6px;
        }

        .main-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* --- Шапка --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out;
            width: 100%;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-title {
            font-family: 'Cinzel', serif;
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .user-stats {
            display: flex;
            gap: 20px;
        }

        .stat-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .stat-badge img {
            width: 20px;
            height: 20px;
        }

        /* --- Дүкен (Шоп) --- */
        .shop-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .shop-page-title {
            font-family: 'Cinzel', serif;
            font-size: 48px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
            background: linear-gradient(to bottom, #ffffff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            width: 100%;
            max-width: 1300px;
            padding-bottom: 50px;
        }

        /* Сандық Карточкалары */
        .shop-card {
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideUpFade 0.6s backwards;
        }

        .shop-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            transition: all 0.4s ease;
        }

        .card-common::before {
            background: var(--rarity-common);
        }

        .card-rare::before {
            background: var(--rarity-rare);
            box-shadow: 0 0 20px var(--rarity-rare);
        }

        .card-epic::before {
            background: var(--rarity-epic);
            box-shadow: 0 0 30px var(--rarity-epic);
        }

        .card-legendary::before {
            background: var(--rarity-legendary);
            box-shadow: 0 0 40px var(--rarity-legendary);
        }

        .shop-card:hover {
            transform: translateY(-10px) scale(1.02);
            z-index: 10;
        }

        .card-common:hover {
            box-shadow: 0 20px 50px rgba(148, 163, 184, 0.2);
        }

        .card-rare:hover {
            box-shadow: 0 20px 60px rgba(16, 185, 129, 0.25);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .card-epic:hover {
            box-shadow: 0 20px 70px rgba(168, 85, 247, 0.3);
            border-color: rgba(168, 85, 247, 0.5);
        }

        .card-legendary:hover {
            box-shadow: 0 20px 80px rgba(212, 175, 55, 0.4);
            border-color: rgba(212, 175, 55, 0.6);
        }

        /* Векторные Кейсы вместо картинок */
        .chest-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
        }

        .chest-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.5;
            z-index: 0;
            transition: all 0.4s;
        }

        .chest-svg {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 20px 20px rgba(0, 0, 0, 0.8));
            animation: float 4s ease-in-out infinite;
        }

        /* Покраска SVG-кейсов */
        .card-common .chest-svg {
            color: var(--rarity-common);
        }

        .card-rare .chest-svg {
            color: var(--rarity-rare);
        }

        .card-rare:hover .chest-glow {
            opacity: 0.8;
            background: var(--rarity-rare);
        }

        .card-epic .chest-svg {
            color: var(--rarity-epic);
        }

        .card-epic:hover .chest-glow {
            opacity: 1;
            background: var(--rarity-epic);
        }

        .card-legendary .chest-svg {
            color: var(--rarity-legendary);
        }

        .card-legendary:hover .chest-glow {
            opacity: 1;
            background: var(--rarity-legendary);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Самый большой ящик (Легендарный) */
        .legendary-banner {
            grid-column: 1 / -1;
            /* Растягиваем на всю ширину сетки */
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 40px 60px;
            text-align: left;
            background: linear-gradient(135deg, rgba(20, 25, 35, 0.9), rgba(212, 175, 55, 0.1));
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .legendary-banner .chest-wrapper {
            margin-bottom: 0;
            width: 180px;
            height: 180px;
        }

        .legendary-info {
            flex: 1;
            margin-left: 40px;
        }

        .legendary-banner h3 {
            font-size: 42px;
            color: var(--rarity-legendary);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .legendary-banner .rates-container {
            width: 300px;
            margin: 20px 0;
        }

        .legendary-banner .btn-buy {
            width: 300px;
            padding: 20px;
            font-size: 24px;
        }

        .shop-card h3 {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .card-common h3 {
            color: #fff;
        }

        .card-rare h3 {
            color: var(--rarity-rare);
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .card-epic h3 {
            color: var(--rarity-epic);
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        /* Проценттер */
        .rates-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .rate-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
        }

        .rate-item:last-child {
            margin-bottom: 0;
        }

        .rate-bar-bg {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 0 15px;
            overflow: hidden;
        }

        .rate-bar-fill {
            height: 100%;
            border-radius: 10px;
        }

        .color-common {
            color: var(--rarity-common);
        }

        .bg-common {
            background: var(--rarity-common);
        }

        .color-rare {
            color: var(--rarity-rare);
        }

        .bg-rare {
            background: var(--rarity-rare);
            box-shadow: 0 0 10px var(--rarity-rare);
        }

        .color-epic {
            color: var(--rarity-epic);
        }

        .bg-epic {
            background: var(--rarity-epic);
            box-shadow: 0 0 12px var(--rarity-epic);
        }

        .color-legendary {
            color: var(--rarity-legendary);
            text-shadow: 0 0 10px var(--rarity-legendary);
        }

        .bg-legendary {
            background: var(--rarity-legendary);
            box-shadow: 0 0 15px var(--rarity-legendary);
        }

        /* Сатып алу батырмасы */
        .btn-buy {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-size: 20px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            color: #fff;
            text-transform: uppercase;
        }

        .card-common .btn-buy {
            background: rgba(148, 163, 184, 0.15);
            border: 1px solid rgba(148, 163, 184, 0.4);
        }

        .card-common .btn-buy:hover {
            background: rgba(148, 163, 184, 0.3);
            transform: translateY(-2px);
        }

        .card-rare .btn-buy {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--rarity-rare);
        }

        .card-rare .btn-buy:hover {
            background: var(--rarity-rare);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            transform: translateY(-2px);
            color: #000;
        }

        .card-epic .btn-buy {
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid var(--rarity-epic);
        }

        .card-epic .btn-buy:hover {
            background: var(--rarity-epic);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.5);
            transform: translateY(-2px);
            color: #000;
        }

        .card-legendary .btn-buy {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--rarity-legendary);
            color: var(--rarity-legendary);
        }

        .card-legendary .btn-buy:hover {
            background: var(--rarity-legendary);
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.6);
            transform: translateY(-2px);
            color: #000;
        }

        .btn-buy img {
            width: 22px;
            height: 22px;
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.5));
        }


        /* =========================================
           АНИМАЦИЯ ОТКРЫТИЯ (АЗАРТ / GACHA EFFECT)
           ========================================= */
        .gacha-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gacha-overlay.active {
            display: flex;
            opacity: 1;
        }

        /* Трясущийся сундук по центру */
        .gacha-chest-container {
            width: 250px;
            height: 250px;
            position: relative;
        }

        .gacha-chest-container .chest-svg {
            color: #fff;
            width: 100%;
            height: 100%;
        }

        .shake-active {
            animation: intenseShake 0.1s infinite, colorFlicker 0.3s infinite;
        }

        @keyframes intenseShake {
            0% {
                transform: translate(3px, 3px) rotate(0deg);
            }

            25% {
                transform: translate(-3px, -3px) rotate(-2deg);
            }

            50% {
                transform: translate(-3px, 3px) rotate(2deg);
            }

            75% {
                transform: translate(3px, -3px) rotate(-1deg);
            }

            100% {
                transform: translate(0px, 0px) rotate(1deg);
            }
        }

        @keyframes colorFlicker {
            0% {
                color: var(--rarity-rare);
                filter: drop-shadow(0 0 30px var(--rarity-rare));
            }

            50% {
                color: var(--rarity-epic);
                filter: drop-shadow(0 0 40px var(--rarity-epic));
            }

            100% {
                color: var(--rarity-legendary);
                filter: drop-shadow(0 0 50px var(--rarity-legendary));
            }
        }

        .gacha-text {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            color: #fff;
            margin-top: 40px;
            letter-spacing: 5px;
            animation: pulse 1s infinite alternate;
            text-transform: uppercase;
        }

        @keyframes pulse {
            from {
                opacity: 0.5;
            }

            to {
                opacity: 1;
                text-shadow: 0 0 20px #fff;
            }
        }

        /* Белая вспышка перед наградой */
        .flash-bang {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 1001;
        }

        .flash-active {
            animation: flashBangAnim 1s ease-out forwards;
        }

        @keyframes flashBangAnim {
            0% {
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }


        /* --- Модальды терезе (Награда) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .rays {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 800px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            animation: spin 15s linear infinite;
            z-index: 0;
            opacity: 0.6;
        }

        @keyframes spin {
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .reward-img-container {
            position: relative;
            z-index: 2;
            margin-bottom: 30px;
        }

        .reward-img {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid;
            background: #1e293b;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        .badge-new {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            color: #fff;
            font-family: 'Cinzel', serif;
            padding: 6px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .reward-title {
            font-family: 'Cinzel', serif;
            font-size: 56px;
            color: #fff;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
            text-shadow: 0 5px 30px rgba(0, 0, 0, 1);
        }

        .reward-subtitle {
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .btn-close {
            background: var(--accent-gold);
            border: none;
            color: #000;
            padding: 16px 50px;
            border-radius: 16px;
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            z-index: 2;
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .btn-close:hover {
            background: #fff;
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>

<body>

    <nav class="sidebar glass">
        <div class="nav-items">
            <a href="profile.html" style="display: block; line-height: 0;">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-avatar-btn"
                    title="Профиль" alt="Аватар">
            </a>
        </div>
        <div class="nav-items">
            <a href="main.html" class="nav-btn" title="Басты бет"><img
                    src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png" alt="Home"></a>
            <a href="#" class="nav-btn active" title="Дүкен"><img
                    src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" alt="Shop"></a>
            <a href="leaderboard.html" class="nav-btn" title="Рейтинг"><img
                    src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" alt="Leaderboard"></a>
        </div>
        <div class="nav-items">
            <a href="#" class="nav-btn" title="Баптаулар"><img
                    src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png" alt="Settings"></a>
        </div>
    </nav>

    <main class="main-content">
        <header class="header">
            <h1 class="header-title">Shadow of the Steppe</h1>
            <div class="user-stats">
                <div class="stat-badge glass" id="balance-container">
                    <img src="https://cdn-icons-png.flaticon.com/512/272/272525.png" alt="Coin">
                    <span id="user-balance">115 400</span> ТГ
                </div>
            </div>
        </header>

        <div class="shop-wrapper">
            <h2 class="shop-page-title">Дүкен</h2>

            <div class="shop-grid">

                <div class="shop-card glass card-common">
                    <div class="chest-wrapper">
                        <svg class="chest-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                            fill="currentColor">

        <div class="modal-content">
            <div class="rays" id="modalRays"></div>
            <div class="reward-img-container">
                <img src="" alt="Avatar" class="reward-img" id="rewardImg">
                <div class="badge-new">Жаңа Аватар</div>
            </div>
            <h2 class="reward-title">Құттықтаймыз!</h2>
            <p class="reward-subtitle" id="rewardRarity">ЭПИКАЛЫҚ</p>
            <button class="btn-close" onclick="closeModal()">Жалғастыру</button>
        </div>
    </div>

    <script>
        // Fix #4: реальный баланс с сервера
        let userBalance = 0;

        async function loadBalance() {
            try {
                const res = await apiFetch('/api/v1/profile');
                const data = await res.json();
                userBalance = data.coins;
                animateValue('user-balance', 0, userBalance, 800);
            } catch (e) {
                console.error('Баланс жүктеу қатесі:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', loadBalance);

        function animateValue(id, start, end, duration) {
            let range = end - start; let current = start;
            let increment = end > start ? Math.ceil(range / (duration / 30)) : Math.floor(range / (duration / 30));
            let timer = setInterval(function () {
                current += increment;
                if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) { current = end; clearInterval(timer); }
                document.getElementById(id).innerHTML = current.toLocaleString('ru-RU').replace(',', ' ');
            }, 30);
        }

        // Fix #3: openChest вызывает реальный API, сервер списывает монеты и добавляет аватар в инвентарь
        async function openChest(type, price) {
            if (userBalance < price) {
                alert('Қаражат жеткіліксіз!');
                return;
            }

            const gachaScreen = document.getElementById('gachaScreen');
            const gachaChestBox = document.getElementById('gachaChestBox');
            const flashBang = document.getElementById('flashBang');

            // Блокируем кнопки на время анимации
            document.querySelectorAll('.btn-buy').forEach(b => b.disabled = true);

            gachaScreen.classList.add('active');
            gachaChestBox.classList.add('shake-active');

            // Запрос к серверу идёт параллельно с анимацией (2.5 сек)
            const serverPromise = apiFetch('/api/v1/shop/open', {
                method: 'POST',
                body: JSON.stringify({ chest_type: type })
            }).then(r => r.json()).catch(err => ({ _error: err.message }));

            setTimeout(async () => {
                flashBang.classList.add('flash-active');

                setTimeout(async () => {
                    gachaScreen.classList.remove('active');
                    gachaChestBox.classList.remove('shake-active');

                    const result = await serverPromise;
                    document.querySelectorAll('.btn-buy').forEach(b => b.disabled = false);

                    if (result._error) {
                        alert('Қате: ' + result._error);
                        return;
                    }

                    // Обновляем баланс из ответа сервера (источник правды)
                    const oldBalance = userBalance;
                    userBalance = result.new_balance;
                    animateValue('user-balance', oldBalance, userBalance, 500);

                    showModal(result.rarity, result.url, result.is_new);
                }, 200);

                setTimeout(() => { flashBang.classList.remove('flash-active'); }, 1000);
            }, 2500);
        }

        function showModal(rarity, avatarUrl, isNew) {
            const modal = document.getElementById('rewardModal');
            const img = document.getElementById('rewardImg');
            const rarityText = document.getElementById('rewardRarity');
            const rays = document.getElementById('modalRays');
            const badgeNew = modal.querySelector('.badge-new');

            const rarities = {
                "common": { text: "ҚАРАПАЙЫМ АВАТАР", color: "#94a3b8" },
                "rare": { text: "СИРЕК АВАТАР", color: "#10b981" },
                "epic": { text: "ЭПИКАЛЫҚ АВАТАР", color: "#a855f7" },
                "legendary": { text: "ЛЕГЕНДАРЛЫ АВАТАР!", color: "#D4AF37" }
            };

            const avatarInfo = rarities[rarity] || rarities.common;

            img.src = avatarUrl || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            img.style.borderColor = avatarInfo.color;
            img.style.boxShadow = `0 0 50px ${avatarInfo.color}80`;

            rarityText.innerText = avatarInfo.text;
            rarityText.style.color = avatarInfo.color;
            rarityText.style.textShadow = `0 0 20px ${avatarInfo.color}80`;

            // Показываем "Жаңа Аватар" только если это реально новая аватарка
            if (badgeNew) badgeNew.style.display = isNew ? 'block' : 'none';

            rays.style.background = `conic-gradient(from 0deg, transparent 0deg, ${avatarInfo.color}40 20deg, transparent 40deg, ${avatarInfo.color}40 60deg, transparent 80deg, ${avatarInfo.color}40 100deg, transparent 120deg, ${avatarInfo.color}40 140deg, transparent 160deg, ${avatarInfo.color}40 180deg, transparent 200deg, ${avatarInfo.color}40 220deg, transparent 240deg, ${avatarInfo.color}40 260deg, transparent 280deg, ${avatarInfo.color}40 300deg, transparent 320deg, ${avatarInfo.color}40 340deg, transparent 360deg)`;

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('rewardModal').classList.remove('active');
        }
    </script>
